name: Build and Push to GHCR 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/translator-app/
          push: true
          # Fix lowercase
          tags: |
            ghcr.io/sethsterling22/tapis-workflow-automation/tapis-dummy-app:latest
            ghcr.io/sethsterling22/tapis-workflow-automation/tapis-dummy-app:${{ github.sha }}